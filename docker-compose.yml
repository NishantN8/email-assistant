version: "3.9"

# ─────────────────────────────────────────────────────────────────
# AI Email Copilot — Full GPU Stack
# ─────────────────────────────────────────────────────────────────
# Default: CPU-only (works everywhere)
# GPU mode: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# ─────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:

  # ── Postgres + pgvector ────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-copilot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot} -d ${POSTGRES_DB:-copilot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis (queue + cache) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: copilot-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ── Ollama (local LLM — CPU fallback, GPU via override) ────────
  ollama:
    image: ollama/ollama:latest
    container_name: copilot-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "11434:11434"
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # ── vLLM server (GPU — enabled via docker-compose.gpu.yml) ────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: copilot-vllm
    restart: unless-stopped
    profiles: ["gpu"]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_MODEL=${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-8192}
    command: >
      --model ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL:-1}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    logging: *default-logging

  # ── API Server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: copilot-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-copilot}:${POSTGRES_PASSWORD:-copilot_secret}@postgres:5432/${POSTGRES_DB:-copilot_db}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_ENDPOINT: http://ollama:11434
      VLLM_ENDPOINT: http://vllm:8000/v1
      VLLM_MODEL: ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ── BullMQ GPU Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: copilot-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-copilot}:${POSTGRES_PASSWORD:-copilot_secret}@postgres:5432/${POSTGRES_DB:-copilot_db}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_ENDPOINT: http://ollama:11434
      VLLM_ENDPOINT: http://vllm:8000/v1
      VLLM_MODEL: ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      WORKER_CONCURRENCY_LOCAL: ${WORKER_CONCURRENCY_LOCAL:-4}
      WORKER_CONCURRENCY_CLOUD: ${WORKER_CONCURRENCY_CLOUD:-8}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  # ── Frontend (Vite/React) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: copilot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  # ── Nginx reverse proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: copilot-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  vllm_cache:

networks:
  default:
    name: copilot-network
    driver: bridge
