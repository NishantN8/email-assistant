# ─────────────────────────────────────────────────────────────────
# Redis configuration for AI Email Copilot
# ─────────────────────────────────────────────────────────────────

bind 0.0.0.0
port 6379
protected-mode no

# ── Persistence ───────────────────────────────────────────────────
# RDB snapshot — save every 900s if ≥1 key changed, etc.
save 900 1
save 300 10
save 60 10000

# AOF persistence for job queue durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# ── Memory ────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── BullMQ queue tuning ───────────────────────────────────────────
# Larger TCP backlog for high-throughput workers
tcp-backlog 511

# Keep connections alive
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow log ─────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Keyspace notifications (for BullMQ events) ───────────────────
notify-keyspace-events "Ex"
