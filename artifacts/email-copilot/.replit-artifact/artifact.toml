kind = "web"
previewPath = "/"
title = "AI Email Copilot"
version = "1.0.0"
id = "artifacts/email-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19521

[services.development]
run = "pnpm --filter @workspace/email-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/email-copilot", "run", "build" ]
publicDir = "artifacts/email-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19521"
BASE_PATH = "/"
