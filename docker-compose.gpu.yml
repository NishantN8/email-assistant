version: "3.9"

# ─────────────────────────────────────────────────────────────────
# GPU override — merge on top of docker-compose.yml
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Prerequisites:
#   - NVIDIA driver installed on host
#   - NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   - docker info | grep -i nvidia   # should show nvidia runtime
# ─────────────────────────────────────────────────────────────────

services:

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      - CUDA_VISIBLE_DEVICES=0

  vllm:
    profiles: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn

  worker:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - GPU_AVAILABLE=true
